name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # npm >= 11.5.1 required for OIDC trusted publishing (npm linked providers).
      # Node 22 ships npm 10.x, so we use npx to run npm 11 for publish only.
      - name: Publish package
        run: npx npm@11.12.1 publish --provenance --access public
